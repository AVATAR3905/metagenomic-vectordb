services:
  - type: web
    name: metagenomic-vectordb
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from chromadb.utils.embedding_functions import DefaultEmbeddingFunction; ef=DefaultEmbeddingFunction(); ef(['warmup'])"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
